services:
  paddleocr-ocrv5:
    build:
      context: .
      dockerfile: tritonserver.Dockerfile
    image: hps-paddleocr-ocrv5:latest
    container_name: paddleocr-ocrv5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${DEVICE_ID:-0}"]
              capabilities: [gpu]
    shm_size: 4gb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v2/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  paddleocr-ocrv5-gateway:
    build:
      context: .
      dockerfile: gateway.Dockerfile
    image: hps-paddleocr-ocrv5-gateway:latest
    container_name: paddleocr-ocrv5-gateway
    environment:
      - HPS_TRITON_URL=paddleocr-ocrv5:8001
      - HPS_MAX_CONCURRENT_REQUESTS=16
      - HPS_INFERENCE_TIMEOUT=600
      - HPS_LOG_LEVEL=INFO
      - UVICORN_WORKERS=4
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    restart: unless-stopped
    depends_on:
      paddleocr-ocrv5:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
